<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USDC Payment App - ARC Testnet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #1a1a3e, #0066cc); padding: 20px 40px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 22px; }
    .badge { background: #00cc88; color: #000; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .card { background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 16px; padding: 24px; margin-bottom: 24px; }
    .card h2 { font-size: 16px; color: #aaa; margin-bottom: 16px; }
    .balance { font-size: 48px; font-weight: bold; color: #00cc88; }
    .balance span { font-size: 18px; color: #aaa; margin-left: 8px; }
    .btn { background: #0066cc; color: #fff; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-size: 14px; width: 100%; margin-top: 8px; }
    .btn:hover { background: #0055aa; }
    .btn-green { background: #00cc88; color: #000; }
    .btn-green:hover { background: #00aa70; }
    input { background: #0a0a1a; border: 1px solid #2a2a4e; color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 12px; font-size: 14px; }
    .status { padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 14px; display: none; }
    .success { background: #003322; border: 1px solid #00cc88; color: #00cc88; }
    .error { background: #330000; border: 1px solid #cc0000; color: #ff6666; }
    .loading { color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>💵 USDC Payment App</h1>
    <div class="badge">ARC-TESTNET</div>
  </div>

  <div class="container">
    <div class="card">
      <h2>WALLET BALANCE</h2>
      <div class="balance" id="balance">--</div>
      <p class="loading" id="balanceLabel">Loading...</p>
      <button class="btn" type="button" onclick="getBalance()">🔄 Refresh Balance</button>
    </div>

    <div class="card">
      <h2>SEND USDC</h2>
      <input id="toAddress" placeholder="Recipient Address (0x...)" />
      <input id="amount" placeholder="Amount (e.g. 0.01)" type="number" step="0.01" />
      <button class="btn btn-green" type="button" onclick="sendUSDC()">💸 Send USDC</button>
      <div class="status" id="sendStatus"></div>
    </div>
  </div>

  <script>
    async function getBalance() {
      const balanceEl = document.getElementById('balance');
      const balanceLabel = document.getElementById('balanceLabel');
      balanceEl.innerText = '--';
      balanceLabel.innerText = 'Loading...';

      try {
        const res = await fetch('http://localhost:3000/balance');
        if (!res.ok) throw new Error('Network response was not ok');
        const data = await res.json();

        if (data && data.length > 0) {
          balanceEl.innerText = data[0].amount;
          balanceLabel.innerText = `${data[0].token.symbol} on ARC-TESTNET`;
        } else {
          balanceEl.innerText = '0.00';
          balanceLabel.innerText = 'No USDC balance found';
        }
      } catch (e) {
        balanceLabel.innerText = 'Error: server not running';
      }
    }

    async function sendUSDC() {
      const to = document.getElementById('toAddress').value.trim();
      const amount = document.getElementById('amount').value.trim();
      const status = document.getElementById('sendStatus');

      if (!to || !amount) {
        status.style.display = 'block';
        status.className = 'status error';
        status.innerText = 'Recipient address and amount are required.';
        return;
      }

      status.style.display = 'block';
      status.className = 'status loading';
      status.innerText = 'Sending...';

      try {
        const res = await fetch('http://localhost:3000/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to, amount })
        });

        const data = await res.json();
        if (res.ok) {
          status.className = 'status success';
          status.innerText = data.txHash ? `Transaction sent: ${data.txHash}` : 'Transaction sent successfully.';
          getBalance();
        } else {
          status.className = 'status error';
          status.innerText = data.error || `Send failed: ${res.status}`;
        }
      } catch (e) {
        status.className = 'status error';
        status.innerText = 'Error: unable to reach server.';
      }
    }

    window.addEventListener('DOMContentLoaded', getBalance);
  </script>
</body>
</html>
